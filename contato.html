<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Contato </title>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-md navbar-light bg-light">
            <div class="container">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacao">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-center" id="menuNavegacao">
                    <ul class="navbar-nav text-center">
                        <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                        <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre mim</a></li>
                        <li class="nav-item"><a class="nav-link" href="habilidades.html">Habilidades</a></li>
                        <li class="nav-item"><a class="nav-link" href="cursos.html">Cursos</a></li>
                        <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section>
            <h2>Fale Comigo</h2>

            <form>
                <div>
                    <label for="nome">Nome Completo:</label>
                    <br>
                    <input type="text" id="nome" placeholder="Digite seu nome">
                </div>
                <br>
                <div>
                    <label for="email">E-mail:</label>
                    <br>
                    <input type="email" id="email" placeholder="Digite seu e-mail">
                </div>
                <br>
                <div>
                    <label for="mensagem">Mensagem:</label>
                    <br>
                    <textarea id="mensagem" rows="4" maxlength="200" placeholder="Escreva sua mensagem aqui"></textarea>

                    <small><span id="contador">0</span>/200 caracteres</small>
                </div>
                <br>
                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer class="mt-5">
        <div class="container text-center">
            <p>Desenvolvido por Carlos Henrique</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>
</body>

</html>
